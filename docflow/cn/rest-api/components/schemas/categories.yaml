Category:
  type: object
  description: 文件类别
  properties:
    id:
      type: string
      description: 文件类别ID
      example: "1234567890"
    name:
      type: string
      description: 文件类别名称
      example: "发票"
    description:
      type: string
      description: 文件类别描述
      example: "增值税发票类型"
    category_prompt:
      type: string
      description: 用于分类的提示词
      example: "增值税发票，包含发票代码、发票号码等字段"
    extract_model:
      type: string
      description: |
        抽取模型
        - Model 1: 速度快，抽取结果稳定
        - Model 2: 适用复杂文档理解
        - Model 3: 多模态，适用简单抽取
        - mixed: 仅在响应中出现，表示该分类下各字段/表格使用了不同模型
      example: "Model 1"
      enum:
        - Model 1
        - Model 2
        - Model 3
        - mixed
    enabled:
      $ref: '#/EnabledStatus'
  required:
    - id
    - name

CategoryFieldConfig:
  type: object
  properties:
    name:
      type: string
      description: 字段名称
      example: 发票代码
    description:
      type: string
      description: 字段描述
      example: 发票代码描述
    prompt:
      type: string
      description: 语义抽取提示词
    use_prompt:
      type: boolean
      description: 是否使用语义提示词
    alias:
      type: array
      description: 字段别名。更新时：不传=不修改，传空数组[]=清空别名，传非空数组=覆盖
      items:
        type: string
      example: ["发票号", "票号", "Invoice No."]
    identity:
      type: string
      description: 导出字段名。更新时：不传=不修改，传空字符串""=清空，传非空值=覆盖
      example: invoice_number
    multi_value:
      type: boolean
      description: 是否多值抽取
    duplicate_value_distinct:
      type: boolean
      description: 是否重复值去重，仅当 multi_value 为 true 时有效
    transform_settings:
      $ref: '#/TransformSettings'

CategoryField:
  allOf:
    - $ref: '#/CategoryFieldConfig'
    - type: object
      properties:
        id:
          type: string
          description: 字段ID
          example: "1234567890"
        enabled:
          $ref: '#/EnabledStatus'
        extract_model:
          type: string
          description: |
            字段抽取模型
            - Model 1: 速度快，抽取结果稳定
            - Model 2: 适用复杂文档理解
            - Model 3: 多模态，适用简单抽取
            - 表格字段取所属表格的模型，普通字段取字段级配置；历史数据按分类配置推断
          example: "Model 1"

CategoryTable:
  type: object
  properties:
    id:
      type: string
      description: 表格ID
      example: "1234567890"
    name:
      type: string
      description: 表格名称
      example: "表格1"
    description:
      type: string
      description: 表格描述
      example: "表格描述"
    prompt:
      type: string
      description: 表格语义抽取提示词
      example: "请抽取每行的品名、数量和金额"
    collect_from_multi_table:
      type: boolean
      description: 多表合并
      example: true
    extract_model:
      type: string
      description: 表格级抽取模型
      example: "Model 1"
    fields:
      type: array
      items:
        $ref: '#/CategoryField'

CategorySample:
  type: object
  description: 文件类别样本
  properties:
    sample_id:
      type: string
      description: 样本ID
      example: "1234567890"
    file_name:
      type: string
      description: 文件名
      example: "invoice_sample.pdf"
  required:
    - sample_id
    - file_name

TransformSettings:
  type: object
  description: 字段输出转换配置，对抽取结果进行格式化处理后再输出。
  properties:
    type:
      type: string
      description: |
        转换类型，决定使用哪种转换规则：
        - `datetime`：将抽取结果标准化为指定日期格式
        - `enumerate`：限定抽取结果必须是预设枚举值之一
        - `regex`：用正则表达式对抽取结果进行匹配和替换
      enum:
        - datetime
        - enumerate
        - regex
    datetime_settings:
      type: object
      description: 时间格式化配置，type=datetime 时必填
      properties:
        format:
          type: string
          description: 目标日期格式，抽取结果将被标准化为此格式输出
          example: yyyy-MM-dd
    enumerate_settings:
      type: object
      description: 枚举限定配置，type=enumerate 时必填
      properties:
        items:
          type: array
          description: 允许的枚举值列表。抽取结果不在列表中时，按 mismatch_action 处理
          items:
            type: string
          example: ["增值税专用发票", "增值税普通发票", "电子发票"]
    regex_settings:
      type: object
      description: 正则转换配置，type=regex 时必填
      properties:
        match:
          type: string
          description: 匹配正则表达式，用于校验或捕获抽取结果
          example: ^(\d{4})-(\d{2})-(\d{2})$
        replace:
          type: string
          description: 替换表达式，支持 $1、$2 等捕获组引用
          example: $1/$2/$3
    mismatch_action:
      type: object
      description: 抽取结果不匹配转换规则时的处理方式（适用于所有转换类型，选填）
      properties:
        mode:
          type: string
          description: |
            处理模式：
            - `default`：输出指定的默认值（需配合 default_value）
            - `warning`：保留原始抽取结果，仅标记告警提醒人工复核
          enum:
            - default
            - warning
        default_value:
          type: string
          description: mode=default 时输出的默认值
          example: "N/A"

CategoryTableConfig:
  type: object
  description: 一站式创建时的表格配置（含内嵌字段）
  properties:
    name:
      type: string
      description: 表格名称
      example: "明细表"
      maxLength: 50
    prompt:
      type: string
      description: 表格语义抽取提示词
      maxLength: 200
    collect_from_multi_table:
      type: boolean
      description: 多表合并
    extract_model:
      type: string
      description: 表格级抽取模型
      enum:
        - Model 1
        - Model 2
        - Model 3
    fields:
      type: array
      description: 表格内嵌字段列表
      items:
        $ref: '#/CategoryFieldConfig'
  required:
    - name

CategoryFieldUpdateItem:
  type: object
  description: 批量更新字段的单项配置（仅包含可更新字段，multi_value/duplicate_value_distinct 不可通过此接口修改）
  properties:
    field_id:
      type: string
      description: 字段ID
      example: "1234567890"
    name:
      type: string
      description: 字段名称
    description:
      type: string
      description: 字段描述
    prompt:
      type: string
      description: 语义抽取提示词
    use_prompt:
      type: boolean
      description: 是否使用语义提示词
    alias:
      type: array
      description: 字段别名。不传=不修改，传空数组[]=清空别名，传非空数组=覆盖
      items:
        type: string
      example: ["发票号", "票号"]
    identity:
      type: string
      description: 导出字段名。不传=不修改，传空字符串""=清空，传非空值=覆盖
      example: invoice_number
    multi_value:
      type: boolean
      description: 是否多值抽取。不传=不修改
    duplicate_value_distinct:
      type: boolean
      description: 是否重复值去重，仅当 multi_value 为 true 时有效。不传=不修改
    transform_settings:
      $ref: '#/TransformSettings'
    extract_model:
      type: string
      description: |
        字段级抽取模型，仅普通字段可独立设置，表格字段不可设置。不传则保持原有配置。
        - Model 1: 速度快，抽取结果稳定
        - Model 2: 适用复杂文档理解
        - Model 3: 多模态，适用简单抽取
      example: "Model 1"
      enum:
        - Model 1
        - Model 2
        - Model 3
  required:
    - field_id

CategoryTableUpdateItem:
  type: object
  properties:
    table_id:
      type: string
      description: 表格ID
      example: "1234567890"
    name:
      type: string
      description: 表格名称
      maxLength: 50
    prompt:
      type: string
      description: 表格语义抽取提示词
      maxLength: 200
    extract_model:
      type: string
      description: 表格级抽取模型
      enum:
        - Model 1
        - Model 2
        - Model 3
    collect_from_multi_table:
      type: boolean
      description: 多表合并
  required:
    - table_id

EnabledStatus:
  type: integer
  description: |
    启用状态
    - 0: 禁用
    - 1: 启用
    - 2: 草稿
  enum:
    - 0
    - 1
    - 2
