                            description: 表格ID
                          name:
                            type: string
                            description: 表格名称（with_detail=true 时返回）
                          description:
                            type: string
                          prompt:
                            type: string
                          collect_from_multi_table:
                            type: boolean
                          extract_model:
                            type: string
                          fields:
                            type: array
                            description: 表格字段列表（with_detail=true 时返回）
                            items:
                              $ref: '../components/schemas/categories.yaml#/CategoryField'
