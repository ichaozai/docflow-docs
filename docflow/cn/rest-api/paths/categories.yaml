                - type: object
                  properties:
                    result:
                      type: array
                      description: with_detail=true 时返回更新后字段列表，否则为 null
                      items:
                        type: object
                        properties:
                          field_id:
                            type: string
                          name:
                            type: string
                          description:
                            type: string
                          prompt:
                            type: string
                          use_prompt:
                            type: boolean
                          alias:
                            type: array
                            items:
                              type: string
                          identity:
                            type: string
                          multi_value:
                            type: boolean
                          duplicate_value_distinct:
                            type: boolean
                          transform_settings:
                            $ref: '../components/schemas/categories.yaml#/TransformSettings'
                          extract_model:
                            type: string
                          enabled:
                            type: integer

/api/app-api/sip/platform/v2/category/fields/delete:
  post:
    summary: 删除文件类别字段
    description: 删除指定的文件类别字段，支持批量删除普通字段和表格字段
    operationId: deleteCategoryFields
    tags:
      - 文件类别
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: 空间ID
                example: "1234567890"
              category_id:
                type: string
                description: 文件类别ID
                example: "1234567890"
              field_ids:
                type: array
                description: 要删除的字段ID列表
                items:
                  type: string
                example: ["1234567890", "0987654321"]
              table_id:
                type: string
                description: |
                  表格ID
                  - 不传：删除普通字段（result.fields 中的字段）
                  - 传入表格ID：删除对应表格下的表格字段（result.tables[].fields 中的字段）
                example: "1234567890"
            required:
              - workspace_id
              - category_id
              - field_ids
    responses:
      '200':
        description: 成功删除文件类别字段
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

