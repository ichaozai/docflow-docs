        description: 成功获取文件类别表格列表
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        tables:
                          type: array
                          description: 表格列表
                          items:
                            type: object
