/api/app-api/sip/platform/v2/category/fields/batch_add:
  post:
    summary: 新增文件类别字段
    description: 在指定文件类别下新增多个字段。全有全无语义：任一字段校验不通过则全部失败。
    operationId: batchAddCategoryFields
    tags:
      - 文件类别
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: 空间ID
                example: "1234567890"
              category_id:
                type: string
                description: 文件类别ID
                example: "1234567890"
              table_id:
                type: string
                description: |
                  表格ID
                  - 不传或为空：创建普通字段
                  - 传入表格ID：创建对应表格下的表格字段
              fields:
                type: array
                description: 批量新增的字段列表
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
              with_detail:
                type: boolean
                description: 是否返回每个字段的完整详情
            required:
              - workspace_id
              - category_id
              - fields
    responses:
      '200':
        description: 批量新增字段成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: array
                      description: 创建结果列表，顺序与请求一致
                      items:
                        type: object
                        properties:
                          field_id:
                            type: string
                            description: 字段ID
                          name:
                            type: string
                            description: 字段名称（with_detail=true 时返回）
                          description:
                            type: string
                          prompt:
                            type: string
                          use_prompt:
                            type: boolean
                          alias:
                            type: array
                            items:
                              type: string
                          identity:
                            type: string
                          multi_value:
                            type: boolean
                          duplicate_value_distinct:
                            type: boolean
                          transform_settings:
                            $ref: '../components/schemas/categories.yaml#/TransformSettings'
                          extract_model:
                            type: string
                          enabled:
                            type: integer
                        required:
                          - field_id

/api/app-api/sip/platform/v2/category/fields/batch_update:
  post:
    summary: 更新文件类别字段
    description: 更新指定文件类别下的多个字段。全有全无语义：任一字段校验不通过则全部失败。
    operationId: batchUpdateCategoryFields
    tags:
      - 文件类别
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: 空间ID
                example: "1234567890"
              category_id:
                type: string
                description: 文件类别ID
                example: "1234567890"
              fields:
                type: array
                description: 批量更新的字段列表
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldUpdateItem'
                minItems: 1
              with_detail:
                type: boolean
                description: 是否返回每个字段更新后的完整详情
            required:
              - workspace_id
              - category_id
              - fields
    responses:
      '200':
        description: 批量更新字段成功
