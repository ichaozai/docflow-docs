        in: query
        description: 空间ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: category_id
        in: query
        description: 文件类别ID
        required: true
        schema:
          type: string
          example: "1234567890"
    responses:
      '200':
        description: 成功获取文件类别字段列表
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
