/api/app-api/sip/platform/v2/category/create:
  post:
    summary: 创建文件类别
    description: |
      在指定空间中创建一个新的文件类别，需要上传至少一个样本文件并配置至少一个字段。

      支持一站式创建：可同时传入 `tables` 参数，创建表格及表格内嵌字段。
    operationId: createCategory
    tags:
      - 文件类别
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: 空间ID
                example: "1234567890"
              name:
                type: string
                description: 文件类别名称
                example: "发票"
                maxLength: 50
              category_prompt:
                type: string
                description: 用于分类的提示词
                example: "增值税发票，包含发票代码、发票号码等字段"
                maxLength: 150
              description:
                type: string
                description: 文件类别描述
              extract_model:
                type: string
                description: |
                  抽取模型
                  - Model 1: 速度快，抽取结果稳定
                  - Model 2: 适用复杂文档理解
                  - Model 3: 多模态，适用简单抽取
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
              sample_files:
                type: array
                description: 样本文件列表，至少上传一个样本文件，一个类别最多有20个样本文件
                items:
                  type: string
                  format: binary
                minItems: 1
                maxItems: 10
              fields:
                type: array
                description: 字段配置列表，至少配置一个字段
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
              tables:
                type: array
                description: 选填，表格配置列表（一站式创建），支持内嵌 fields
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryTableConfig'
              with_detail:
                type: boolean
                description: |
                  是否返回完整详情。传 true 时响应包含完整的分类信息（含字段、表格、样本）。
                  不传或为 false 时仅返回 category_id。
            required:
              - workspace_id
              - name
              - extract_model
              - sample_files
              - fields
    responses:
      '200':
        description: 成功创建文件类别
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        category_id:
                          type: string
                          description: 文件类别ID
                          example: "1234567890"
                        name:
                          type: string
                          description: 文件类别名称（with_detail=true 时返回）
                        description:
                          type: string
                          description: 文件类别描述（with_detail=true 时返回）
                        category_prompt:
                          type: string
                          description: 分类提示词（with_detail=true 时返回）
                        extract_model:
                          type: string
                          description: 抽取模型（with_detail=true 时返回）
                        enabled:
                          type: integer
                          description: 启用状态（with_detail=true 时返回）
                        fields:
                          type: array
                          description: 字段列表（with_detail=true 时返回）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryField'
                        tables:
                          type: array
                          description: 表格列表（with_detail=true 时返回）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryTable'
                        samples:
                          type: array
                          description: 样本列表（with_detail=true 时返回）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategorySample'
                      required:
                        - category_id

/api/app-api/sip/platform/v2/category/list:
  get:
    summary: 获取空间文件类别列表
    tags:
      - 文件类别
    description: 获取空间文件类别列表
    operationId: listCategories
    parameters:
      - name: workspace_id
        in: query
        description: 空间ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: 页码
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: 每页数量
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: enabled
        in: query
        description: |
          启用状态
          - all: 所有
          - 1: 启用
          - 0: 禁用
          - 2: 草稿
        required: false
        schema:
          type: string
          default: "1"
          enum:
            - "all"
            - "1"
            - "0"
            - "2"
    responses:
      '200':
        description: 成功获取空间文件类别列表
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: 文件类别总数
                          example: 100
                        page:
                          type: integer
                          description: 当前页码
                          example: 1
                        page_size:
                          type: integer
                          description: 每页数量
                          example: 20
                        categories:
                          type: array
                          items:
                            $ref: '../components/schemas/categories.yaml#/Category'

/api/app-api/sip/platform/v2/category/update:
  post:
    summary: 更新文件类别
    description: |
      更新指定文件类别的信息。

      注意：设置 extract_model 时将级联覆盖该分类下所有字段和表格的抽取模型。
    operationId: updateCategory
    tags:
      - 文件类别
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: 空间ID
                example: "1234567890"
              category_id:
                type: string
                description: 文件类别ID
                example: "1234567890"
              name:
                type: string
                description: 文件类别名称
                example: "发票"
                maxLength: 50
              category_prompt:
                type: string
                description: 用于分类的提示词
                example: "增值税发票，包含发票代码、发票号码等字段"
                maxLength: 150
              enabled:
                $ref: '../components/schemas/categories.yaml#/EnabledStatus'
              extract_model:
                type: string
                description: |
                  抽取模型，设置后级联覆盖所有字段和表格
                  - Model 1: 速度快，抽取结果稳定
                  - Model 2: 适用复杂文档理解
                  - Model 3: 多模态，适用简单抽取
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
              with_detail:
                type: boolean
                description: |
                  是否返回完整详情。传 true 时响应返回分类自身信息（不含子层级字段/表格）。
                  不传或为 false 时仅返回 code/msg。
            required:
              - workspace_id
              - category_id
    responses:
      '200':
        description: 成功更新文件类别
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      description: with_detail=true 时返回分类自身信息，否则为 null
                      type: object
                      properties:
                        id:
                          type: string
                          description: 分类ID
                        name:
                          type: string
                          description: 分类名称
                        description:
                          type: string
                          description: 分类描述
                        category_prompt:
                          type: string
                          description: 分类提示词
                        extract_model:
                          type: string
                          description: 抽取模型
                        enabled:
                          type: integer
                          description: 启用状态

/api/app-api/sip/platform/v2/category/delete:
  post:
    summary: 删除文件类别
    description: 删除指定的文件类别
    operationId: deleteCategory
    tags:
      - 文件类别
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: 空间ID
                example: "1234567890"
              category_ids:
                type: array
                items:
                  type: string
                description: 要删除的文件类别ID列表
                example: ["1234567890", "0987654321"]
            required:
              - workspace_id
              - category_ids
    responses:
      '200':
        description: 成功删除文件类别
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

/api/app-api/sip/platform/v2/category/fields/list:
