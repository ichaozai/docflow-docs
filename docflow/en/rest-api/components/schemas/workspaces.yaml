Workspace:
  type: object
  description: Workspace
  properties:
    workspace_id:
      type: string
      description: Workspace ID (system generated)
      example: "1234567890"
    name:
      type: string
      description: Workspace name
      example: "My Workspace"
    description:
      type: string
      description: Workspace description
      example: "This is a workspace for invoice processing"
    auth_scope:
      type: integer
      description: "Collaboration scope 0: Visible only to self 1: Visible to enterprise members"
      example: 1
      enum:
        - 0
        - 1
    manage_account_id:
      type: string
      description: Workspace administrator ID
      example: "admin_123456"
    manage_account_name:
      type: string
      description: Workspace administrator name
      example: "John Doe"
    callback_url:
      type: string
      description: Callback URL
      example: "https://example.com/callback"
    callback_retry_time:
      type: integer
      description: Callback retry count
      example: 3
  required:
    - workspace_id
    - name
