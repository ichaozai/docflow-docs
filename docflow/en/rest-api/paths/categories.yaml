/api/app-api/sip/platform/v2/category/create:
  post:
    summary: Create File Category
    description: |
      Create a new file category in the specified workspace, requiring at least one sample file and at least one field configuration.

      Supports one-stop creation: you can pass the `tables` parameter to create tables with nested fields simultaneously.
    operationId: createCategory
    tags:
      - File Category
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              name:
                type: string
                description: File category name
                example: "Invoice"
                maxLength: 50
              category_prompt:
                type: string
                description: Prompt for classification
                example: "VAT invoice, including fields such as invoice code, invoice number, etc."
                maxLength: 150
              description:
                type: string
                description: File category description
              extract_model:
                type: string
                description: |
                  Extraction model
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
              sample_files:
                type: array
                description: Sample file list, at least one sample file must be uploaded, a category can have at most 20 sample files
                items:
                  type: string
                  format: binary
                minItems: 1
                maxItems: 10
              fields:
                type: array
                description: Field configuration list, at least one field must be configured
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
              tables:
                type: array
                description: Optional, table configuration list (one-stop creation), supports nested fields
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryTableConfig'
              with_detail:
                type: boolean
                description: |
                  Whether to return full details. When true, the response includes complete category info (with fields, tables, samples).
                  When not set or false, only category_id is returned.
            required:
              - workspace_id
              - name
              - extract_model
              - sample_files
              - fields
    responses:
      '200':
        description: Successfully created file category
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        category_id:
                          type: string
                          description: File category ID
                          example: "1234567890"
                        name:
                          type: string
                          description: File category name (returned when with_detail=true)
                        description:
                          type: string
                          description: File category description (returned when with_detail=true)
                        category_prompt:
                          type: string
                          description: Classification prompt (returned when with_detail=true)
                        extract_model:
                          type: string
                          description: Extraction model (returned when with_detail=true)
                        enabled:
                          type: integer
                          description: Enabled status (returned when with_detail=true)
                        fields:
                          type: array
                          description: Field list (returned when with_detail=true)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryField'
                        tables:
                          type: array
                          description: Table list (returned when with_detail=true)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryTable'
                        samples:
                          type: array
                          description: Sample list (returned when with_detail=true)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategorySample'
                      required:
                        - category_id

/api/app-api/sip/platform/v2/category/list:
  get:
    summary: Get Workspace File Category List
    tags:
      - File Category
    description: Get workspace file category list
    operationId: listCategories
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: enabled
        in: query
        description: |
          Enabled status
          - all: All
          - 1: Enabled
          - 0: Disabled
          - 2: Draft
        required: false
        schema:
          type: string
          default: "1"
          enum:
            - "all"
            - "1"
            - "0"
            - "2"
    responses:
      '200':
        description: Successfully retrieved workspace file category list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of file categories
                          example: 100
                        page:
                          type: integer
                          description: Current page number
                          example: 1
                        page_size:
                          type: integer
                          description: Page size
                          example: 20
                        categories:
                          type: array
                          items:
                            $ref: '../components/schemas/categories.yaml#/Category'

/api/app-api/sip/platform/v2/category/update:
  post:
    summary: Update File Category
    description: |
      Update the specified file category information.

      Note: Setting extract_model will cascade override the extraction model of all fields and tables under this category.
    operationId: updateCategory
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              name:
                type: string
                description: File category name
                example: "Invoice"
                maxLength: 50
              category_prompt:
                type: string
                description: Prompt for classification
                example: "VAT invoice, including fields such as invoice code, invoice number, etc."
                maxLength: 150
              enabled:
                $ref: '../components/schemas/categories.yaml#/EnabledStatus'
              extract_model:
                type: string
                description: |
                  Extraction model, cascades to all fields and tables when set
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
              with_detail:
                type: boolean
                description: |
                  Whether to return full details. When true, the response returns category self info (without child-level fields/tables).
                  When not set or false, only code/msg is returned.
            required:
              - workspace_id
              - category_id
    responses:
      '200':
        description: Successfully updated file category
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      description: Category self info when with_detail=true, otherwise null
                      type: object
                      properties:
                        id:
                          type: string
                          description: Category ID
                        name:
                          type: string
                          description: Category name
                        description:
                          type: string
                          description: Category description
                        category_prompt:
                          type: string
                          description: Classification prompt
                        extract_model:
                          type: string
                          description: Extraction model
                        enabled:
                          type: integer
                          description: Enabled status

/api/app-api/sip/platform/v2/category/delete:
  post:
    summary: Delete File Category
    description: Delete the specified file categories
    operationId: deleteCategory
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_ids:
                type: array
                items:
                  type: string
                description: List of file category IDs to delete
                example: ["1234567890", "0987654321"]
            required:
              - workspace_id
              - category_ids
    responses:
      '200':
        description: Successfully deleted file categories
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

/api/app-api/sip/platform/v2/category/fields/list:
  get:
    summary: Get File Category Field List
    description: Get file category field list, including regular fields and tables (with table fields)
    operationId: listCategoryFields
    tags:
      - File Category
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: category_id
        in: query
        description: File category ID
        required: true
        schema:
          type: string
          example: "1234567890"
    responses:
      '200':
        description: Successfully retrieved file category field list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        fields:
                          type: array
                          description: Regular field list
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryField'
                        tables:
                          type: array
                          description: Table list (with table fields)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryTable'

/api/app-api/sip/platform/v2/category/fields/batch_add:
  post:
    summary: Add File Category Fields
    description: Add multiple fields under the specified file category. All-or-nothing semantics — if any field fails validation, the entire batch fails.
    operationId: batchAddCategoryFields
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              table_id:
                type: string
                description: |
                  Table ID
                  - Not provided or empty: Creates regular fields
                  - Provide table ID: Creates table fields under the specified table
              fields:
                type: array
                description: List of fields to add
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
              with_detail:
                type: boolean
                description: Whether to return full details for each field
            required:
              - workspace_id
              - category_id
              - fields
    responses:
      '200':
        description: Successfully added fields
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: array
                      description: Creation result list, in same order as request
                      items:
                        type: object
                        properties:
                          field_id:
                            type: string
                            description: Field ID
                          name:
                            type: string
                            description: Field name (returned when with_detail=true)
                          description:
                            type: string
                          prompt:
                            type: string
                          use_prompt:
                            type: boolean
                          alias:
                            type: array
                            items:
                              type: string
                          identity:
                            type: string
                          multi_value:
                            type: boolean
                          duplicate_value_distinct:
                            type: boolean
                          transform_settings:
                            $ref: '../components/schemas/categories.yaml#/TransformSettings'
                          extract_model:
                            type: string
                          enabled:
                            type: integer
                        required:
                          - field_id

/api/app-api/sip/platform/v2/category/fields/batch_update:
  post:
    summary: Update File Category Fields
    description: Update multiple fields under the specified file category. All-or-nothing semantics.
    operationId: batchUpdateCategoryFields
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              fields:
                type: array
                description: List of fields to update
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldUpdateItem'
                minItems: 1
              with_detail:
                type: boolean
                description: Whether to return full details for each updated field
            required:
              - workspace_id
              - category_id
              - fields
    responses:
      '200':
        description: Successfully updated fields
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: array
                      description: Updated field list when with_detail=true, otherwise null
                      items:
                        type: object
                        properties:
                          field_id:
                            type: string
                          name:
                            type: string
                          description:
                            type: string
                          prompt:
                            type: string
                          use_prompt:
                            type: boolean
                          alias:
                            type: array
                            items:
                              type: string
                          identity:
                            type: string
                          multi_value:
                            type: boolean
                          duplicate_value_distinct:
                            type: boolean
                          transform_settings:
                            $ref: '../components/schemas/categories.yaml#/TransformSettings'
                          extract_model:
                            type: string
                          enabled:
                            type: integer

/api/app-api/sip/platform/v2/category/fields/delete:
  post:
    summary: Delete File Category Fields
    description: Delete the specified file category fields, supports batch deletion of regular fields and table fields
    operationId: deleteCategoryFields
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              field_ids:
                type: array
                description: List of field IDs to delete
                items:
                  type: string
                example: ["1234567890", "0987654321"]
              table_id:
                type: string
                description: |
                  Table ID
                  - Not provided: Deletes regular fields (fields in result.fields)
                  - Provide table ID: Deletes table fields under the specified table (fields in result.tables[].fields)
                example: "1234567890"
            required:
              - workspace_id
              - category_id
              - field_ids
    responses:
      '200':
        description: Successfully deleted file category fields
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

