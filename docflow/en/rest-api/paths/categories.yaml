# Category sample endpoints
/api/app-api/sip/platform/v2/category/sample/upload:
  post:
    summary: Upload Single Category Sample
    description: |
      Upload a sample file for the specified file category

      > ⚠️ This endpoint is still available but will no longer be maintained. Please use [Upload Category Samples](/api-reference/file-category-samples/upload-category-samples) instead.
    operationId: uploadCategorySample
    tags:
      - Deprecated
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              file:
                type: string
                format: binary
                description: Sample file
              with_detail:
                type: boolean
                description: |
                  Whether to return full details. When true, the response additionally returns the full sample list of this category.
                  When not set or false, only sample_id is returned.
            required:
              - workspace_id
              - category_id
              - file
    responses:
      '200':
        description: Successfully uploaded category sample
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        sample_id:
                          type: string
                          description: Sample ID
                          example: "1234567890"
                        samples:
                          type: array
                          description: Full sample list of this category (returned when with_detail=true)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategorySample'
                      required:
                        - sample_id

/api/app-api/sip/platform/v2/category/sample/batch_upload:
  post:
    summary: Upload Category Samples
    description: Upload multiple sample files for the specified file category, maximum 20 files
    operationId: batchUploadCategorySample
    tags:
      - File Category Samples
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              files:
                type: array
                description: Sample file list, maximum 20 files
                items:
                  type: string
                  format: binary
                minItems: 1
                maxItems: 10
              with_detail:
                type: boolean
                description: When true, the response returns the full sample list of this category
            required:
              - workspace_id
              - category_id
              - files
    responses:
      '200':
        description: Successfully batch uploaded samples
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        samples:
                          type: array
                          description: Full sample list of this category (returned when with_detail=true)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategorySample'

/api/app-api/sip/platform/v2/category/sample/list:
  get:
    summary: Get Category Sample List
    description: Get the sample list of the specified file category
    operationId: listCategorySamples
    tags:
      - File Category Samples
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: category_id
        in: query
        description: File category ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          default: 20
    responses:
      '200':
        description: Successfully retrieved category sample list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of samples
                          example: 10
                        page:
                          type: integer
                          description: Current page number
                          example: 1
                        page_size:
                          type: integer
                          description: Page size
                          example: 20
                        samples:
                          type: array
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategorySample'

/api/app-api/sip/platform/v2/category/sample/download:
  get:
