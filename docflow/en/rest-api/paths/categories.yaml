                              fields:
                                type: array
                                items:
                                  $ref: '../components/schemas/categories.yaml#/CategoryField'

/api/app-api/sip/platform/v2/category/fields/add:
  post:
    summary: Add File Category Field
    description: Add a field to the specified file category, supporting both regular fields and table fields
    operationId: addCategoryField
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              table_id:
                type: string
                description: |
                  Table ID
                  - Not provided or empty: Create a regular field, result will appear in result.fields
                  - Provided table ID: Create a table field under the corresponding table, result will appear in result.tables[].fields
                example: "1234567890"
              extract_model:
                type: string
                description: |
                  Optional, field-level extraction model, only supported for regular fields (not table fields), defaults to Model 1 if not specified
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
            required:
              - workspace_id
              - category_id
              - name
    responses:
      '200':
        description: Successfully added file category field
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        field_id:
                          type: string
                          description: Newly created field ID
                          example: "1234567890"

/api/app-api/sip/platform/v2/category/fields/update:
  post:
    summary: Update File Category Field
    description: Update information of the specified file category field, supporting both regular fields and table fields
    operationId: updateCategoryField
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              field_id:
                type: string
                description: Field ID
                example: "1234567890"
              table_id:
                type: string
                description: |
                  Table ID
                  - Not required for regular fields
                  - Required for table fields, need to provide the table ID it belongs to
                example: "1234567890"
              extract_model:
                type: string
                description: |
                  Field-level extraction model
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
            required:
              - workspace_id
              - category_id
              - field_id
    responses:
      '200':
        description: Successfully updated file category field
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

/api/app-api/sip/platform/v2/category/fields/delete:
  post:
    summary: Delete File Category Fields
    description: Delete the specified file category fields, supporting batch deletion of both regular fields and table fields
    operationId: deleteCategoryFields
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              field_ids:
                type: array
                description: List of field IDs to delete
                items:
                  type: string
                example: ["1234567890", "0987654321"]
              table_id:
                type: string
                description: |
                  Table ID
                  - Not provided: Delete regular fields (fields in result.fields)
                  - Provided table ID: Delete table fields under the corresponding table (fields in result.tables[].fields)
                example: "1234567890"
            required:
              - workspace_id
              - category_id
              - field_ids
    responses:
      '200':
        description: Successfully deleted file category fields
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

