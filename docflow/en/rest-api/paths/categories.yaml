/api/app-api/sip/platform/v2/category/create:
  post:
    summary: Create File Category
    description: Create a new file category in the specified workspace, requiring at least one sample file and at least one field configuration
    operationId: createCategory
    tags:
      - File Category
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              name:
                type: string
                description: File category name
                example: "Invoice"
                maxLength: 50
              category_prompt:
                type: string
                description: Prompt for classification
                example: "VAT invoice, including fields such as invoice code, invoice number, etc."
                maxLength: 150
              extract_model:
                type: string
                description: |
                  Optional, extraction model, defaults to Model 1 if not specified
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
              sample_files:
                type: array
                description: Sample file list, at least one sample file must be uploaded, a category can have at most 10 sample files
                items:
                  type: string
                  format: binary
                minItems: 1
                maxItems: 10
              fields:
                type: array
                description: Field configuration list, at least one field must be configured
                items:
                  allOf:
                    - $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
            required:
              - workspace_id
              - name
              - extract_model
              - sample_files
              - fields
    responses:
      '200':
        description: Successfully created file category
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        category_id:
                          type: string
                          description: File category ID
                          example: "1234567890"

/api/app-api/sip/platform/v2/category/list:
  get:
    summary: Get Workspace File Category List
    tags:
      - File Category
    description: Get workspace file category list
    operationId: listCategories
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: enabled
        in: query
        description: |
          Enabled status  
          - all: All
          - 1: Enabled
          - 0: Disabled
          - 2: Draft
        required: false
        schema:
          type: string
          default: "1"
          enum:
            - "all"
            - "1"
            - "0"
            - "2"
    responses:
      '200':
        description: Successfully retrieved workspace file category list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of file categories
                          example: 100
                        page:
                          type: integer
                          description: Current page number
                          example: 1
                        page_size:
                          type: integer
                          description: Page size
                          example: 20
                        categories:
                          type: array
                          items:
                            $ref: '../components/schemas/categories.yaml#/Category'

/api/app-api/sip/platform/v2/category/update:
  post:
    summary: Update File Category
    description: Update information of the specified file category
    operationId: updateCategory
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              name:
                type: string
                description: File category name
                example: "Invoice"
                maxLength: 50
              category_prompt:
                type: string
                description: Prompt for classification
                example: "VAT invoice, including fields such as invoice code, invoice number, etc."
                maxLength: 150
              enabled:
                $ref: '../components/schemas/categories.yaml#/EnabledStatus'
              extract_model:
                type: string
                description: |
                  Extraction model
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
            required:
              - workspace_id
              - category_id
    responses:
      '200':
        description: Successfully updated file category
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

/api/app-api/sip/platform/v2/category/delete:
  post:
    summary: Delete File Category
    description: Delete the specified file category
    operationId: deleteCategory
    tags:
      - File Category
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_ids:
                type: array
                items:
                  type: string
                description: List of file category IDs to delete
                example: ["1234567890", "0987654321"]
            required:
              - workspace_id
              - category_ids
    responses:
      '200':
        description: Successfully deleted file category
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

/api/app-api/sip/platform/v2/category/fields/list:
