              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              name:
                type: string
                description: Table name
                example: "Table 1"
                maxLength: 50
              prompt:
                type: string
                description: Table semantic extraction prompt
                example: "Extract item name, quantity and amount from each row"
                maxLength: 200
              collect_from_multi_table:
                type: boolean
                description: Merge multiple tables
                example: true
              extract_model:
                type: string
                description: |
                  Table-level extraction model
                  - Model 1: Fast speed with stable extraction results
                  - Model 2: Suitable for complex document understanding
                  - Model 3: VLM, suitable for simple extraction
                example: "Model 1"
                enum:
                  - Model 1
                  - Model 2
                  - Model 3
              with_detail:
                type: boolean
                description: |
                  Whether to return full details. When true, the response includes complete table info (with field list).
                  When not set or false, only table_id is returned.
            required:
              - workspace_id
              - category_id
              - name
    responses:
      '200':
        description: Successfully added file category table
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        table_id:
                          type: string
                          description: New table ID
                          example: "1234567890"
                        name:
                          type: string
                          description: Table name (returned when with_detail=true)
                        description:
                          type: string
                          description: Table description (returned when with_detail=true)
                        prompt:
                          type: string
                          description: Table semantic extraction prompt (returned when with_detail=true)
                        collect_from_multi_table:
                          type: boolean
                          description: Merge multiple tables (returned when with_detail=true)
                        extract_model:
                          type: string
                          description: Table-level extraction model (returned when with_detail=true)
                        fields:
                          type: array
                          description: Table field list (returned when with_detail=true)
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryField'
                      required:
                        - table_id

