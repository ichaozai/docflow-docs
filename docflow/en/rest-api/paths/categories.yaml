        schema:
          type: string
          example: "1234567890"
      - name: category_id
        in: query
        description: File category ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: sample_id
        in: query
        description: Sample ID
        required: true
        schema:
          type: string
          example: "1234567890"
