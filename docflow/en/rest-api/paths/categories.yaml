      '200':
        description: Successfully added file category field
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        field_id:
                          type: string
                          description: Newly created field ID
                          example: "1234567890"
                        name:
                          type: string
                          description: Field name (returned when with_detail=true)
                        description:
                          type: string
                          description: Field description (returned when with_detail=true)
                        prompt:
                          type: string
                          description: Semantic extraction prompt (returned when with_detail=true)
                        use_prompt:
                          type: boolean
                          description: Whether to use semantic prompt (returned when with_detail=true)
                        alias:
                          type: array
                          items:
                            type: string
                          description: Field aliases (returned when with_detail=true)
                        identity:
                          type: string
                          description: Export field name (returned when with_detail=true)
                        multi_value:
                          type: boolean
                          description: Whether multi-value extraction is enabled (returned when with_detail=true)
                        duplicate_value_distinct:
                          type: boolean
                          description: Whether deduplication is enabled (returned when with_detail=true)
                        transform_settings:
                          $ref: '../components/schemas/categories.yaml#/TransformSettings'
                        extract_model:
                          type: string
                          description: Field extraction model (returned when with_detail=true)
                        enabled:
                          type: integer
                          description: Enabled status (returned when with_detail=true)
                      required:
                        - field_id

