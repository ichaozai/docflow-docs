    description: Get all tables configured under the specified file category
    operationId: listCategoryTables
    tags:
      - File Category
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: category_id
        in: query
        description: File category ID
        required: true
        schema:
          type: string
          example: "1234567890"
    responses:
      '200':
        description: Successfully retrieved file category tables list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        tables:
                          type: array
