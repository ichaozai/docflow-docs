/api/app-api/sip/platform/v2/category/sample/batch_download:
  post:
    summary: Download Category Samples (ZIP)
    description: Download multiple sample files of the specified category, packaged as a ZIP file. When sample_ids is not provided, all samples are downloaded.
    operationId: batchDownloadCategorySample
    tags:
      - File Category Samples
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: Workspace ID
                example: "1234567890"
              category_id:
                type: string
                description: File category ID
                example: "1234567890"
              sample_ids:
                type: array
                description: List of sample IDs to download. When not provided, all samples of this category are downloaded.
                items:
                  type: string
                example: ["1234567890", "0987654321"]
            required:
              - workspace_id
              - category_id
    responses:
      '200':
        description: Successfully downloaded sample ZIP file
        content:
          application/zip:
            schema:
              type: string
              format: binary

/api/app-api/sip/platform/v2/category/sample/delete:
  post:
