TextInLines:
  type: object
  properties:
    angle:
      type: string
      description: 角度
      example: 0
    pos:
      type: array
      description: 座標
      items:
        type: integer
        description: 座標
        example: 1
    page:
      type: integer
      description: ページ番号
      example: 1
    text:
      type: string
      description: テキスト
      example: テキスト内容
    char_pos:
      type: array
      description: 文字座標
      items:
        type: array
        description: 文字座標
        items:
          type: integer
          description: 文字座標
          example: 1
  description: フィールド座標

TaskType:
  type: integer
  description: |
    タスクタイプ
    - 0: **ファイル分割サブタスク**: 「ファイル分割」スイッチを有効にしたファイルタスクが正常に実行されると、そのファイルバッチタスク内のファイル分割操作で生成されたサブタスクは分割サブタスクとなり、ファイルカテゴリ配下の実際のファイルセット数に応じて分割されます
    - 1: **通常タスク**: 「ファイル分割」および「複数画像クロップ」スイッチが有効でないファイルタスク
    - 2: **親タスク**: 「ファイル分割」または「複数画像クロップ」スイッチを有効にしたファイルタスクの実行後、そのファイルバッチタスク内の各ファイルは親タスクになります
    - 3: **クロップサブタスク**: 「複数画像クロップ」スイッチを有効にしたファイルタスクが正常に実行されると、そのファイルバッチタスク内の複数画像クロップ操作で生成されたサブタスクはクロップサブタスクとなり、ファイルカテゴリ配下の実際のクロップ結果数に応じて分割されます
  example: 1

PagesInfo:
  type: array
  description: |
    ファイルの各ページをレンダリングするためのデータ。data.fields の page および position フィールドと組み合わせることで、ページ上のフィールド位置を正確に描画できます。
  items:
    type: object
    properties:
      page:
        type: integer
        description: ページ番号。0 から開始
        example: 1
      angle:
        type: integer
        description: 回転角度
        enum:
          - 0
          - 90
          - 180
          - 270
      width:
        type: integer
        description: 補正後のページ幅
        example: 1024
      height:
        type: integer
        description: 補正後のページ高さ
        example: 1024
      dpi:
        type: integer
        description: PDF を画像に変換する際の解像度。PDF 以外のファイルでは、この値は 0 です。
        example: 144

DocumentParserParam:
  type: object
  properties:
    formula_level:
      type: integer
      description: "数式認識レベル（0: 表示数式とインライン数式を認識、1: 表示数式のみ認識、2: 数式を認識しない）"
      example: 0
    apply_merge:
      type: integer
      description: "ページをまたぐ段落とテーブルを結合（0: いいえ、1: はい）"
      example: 1
    table_text_split_mode:
      type: integer
      description: "テーブル罫線と交差するテキストブロックを分割（0: いいえ、1: はい）"
      example: 0
    crop_dewarp:
      type: integer
      description: "クロップと歪み補正（0: いいえ、1: はい）"
      example: 0
    remove_watermark:
      type: integer
      description: "透かし除去（0: いいえ、1: はい）"
      example: 0
    dpi:
      type: integer
      description: "ファイル解像度（144: デフォルト、216: 高精度）"
      example: 144
      enum:
        - 144
        - 216
    parse_mode:
      type: string
      description: |
        解析モード
        - `auto`: 自動（デフォルト）
        - `scan`: スキャン文書モード
        - `vlm`: VLM モード
      example: auto
      enum:
        - auto
        - scan
        - vlm
    pdf_pwd:
      type: string
      description: 暗号化 PDF ファイルを復号するための PDF パスワード

TokenResult:
  type: object
  properties:
    result:
      type: object
      properties:
        token:
          type: string
          description: iframe シナリオで使用する有効なトークン
          example: abcd
        expiry:
          type: integer
          description: "有効期限（エポックタイムスタンプ形式、単位: 秒）"
          example: 1700000000
