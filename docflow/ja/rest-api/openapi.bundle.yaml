      summary: カテゴリサンプルをアップロード
      description: 指定したファイルカテゴリに複数のサンプルファイルをアップロードします。最大 20 ファイルまで対応します
      operationId: batchUploadCategorySample
      tags:
        - ファイルカテゴリサンプル
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                  description: ワークスペース ID
                  example: '1234567890'
                category_id:
                  type: string
                  description: ファイルカテゴリ ID
                  example: '1234567890'
                files:
                  type: array
                  description: サンプルファイルリスト。最大 20 ファイル
                  items:
                    type: string
                    format: binary
