  /api/app-api/sip/platform/v2/category/update:
    post:
      summary: ファイルカテゴリを更新
      description: |
        指定したファイルカテゴリ情報を更新します。

        注意: extract_model を設定すると、このカテゴリ配下のすべてのフィールドとテーブルの抽出モデルが連鎖的に上書きされます。
      operationId: updateCategory
      tags:
        - ファイルカテゴリ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                  description: ワークスペース ID
                  example: '1234567890'
                category_id:
                  type: string
                  description: ファイルカテゴリ ID
                  example: '1234567890'
                name:
                  type: string
                  description: ファイルカテゴリ名
                  example: インボイス
                  maxLength: 50
                category_prompt:
                  type: string
                  description: 分類用プロンプト
                  example: VAT インボイス。インボイスコード、インボイス番号などのフィールドを含みます。
                  maxLength: 150
                enabled:
                  $ref: '#/components/schemas/EnabledStatus'
                extract_model:
                  type: string
                  description: |
                    抽出モデル, cascades to all fields and tables when set
                    - Model 1: 高速で安定した抽出結果
                    - Model 2: 複雑な文書理解に適しています
                    - Model 3: VLM。シンプルな抽出に適しています
                  example: Model 1
                  enum:
                    - Model 1
                    - Model 2
                    - Model 3
                with_detail:
                  type: boolean
                  description: |
                    完全な詳細を返すかどうか。true の場合、子レベルのフィールド/テーブルを除くカテゴリ自身の情報を返します。
                    未設定または false の場合、code/msg のみを返します。
              required:
                - workspace_id
                - category_id
      responses:
        '200':
          description: ファイルカテゴリの更新に成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CodeMessage'
                  - type: object
                    properties:
                      result:
                        description: with_detail=true の場合はカテゴリ自身の情報、それ以外は null
                        type: object
                        properties:
                          id:
                            type: string
                            description: カテゴリ ID
                          name:
                            type: string
                            description: カテゴリ名
                          description:
                            type: string
                            description: カテゴリ説明
                          category_prompt:
                            type: string
                            description: 分類プロンプト
                          extract_model:
                            type: string
                            description: 抽出モデル
                          enabled:
                            type: integer
                            description: 有効化ステータス
