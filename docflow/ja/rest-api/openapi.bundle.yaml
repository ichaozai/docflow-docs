                  example: 'https://example.com/callback'
                callback_retry_time:
                  type: integer
                  description: コールバック再試行回数
                  example: 3
                  minimum: 1
                  maximum: 3
              required:
                - workspace_id
                - name
                - auth_scope
      responses:
        '200':
          description: ワークスペースの更新に成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeMessage'
