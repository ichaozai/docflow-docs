/api/app-api/sip/platform/v2/auth/token:
  get:
    summary: 短期有効トークンを生成
    description: 短期有効トークンを生成 (for iframe scenarios)
    operationId: authToken
    responses:
      '200':
        description: Token information successfully retrieved
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - $ref: '../components/schemas/files.yaml#/TokenResult'
