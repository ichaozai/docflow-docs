/api/app-api/sip/platform/v2/category/create:
  post:
    summary: ファイルカテゴリを作成
    description: |
      指定したワークスペースに新しいファイルカテゴリを作成します。少なくとも 1 つのサンプルファイルと 1 つのフィールド設定が必要です。

      一括作成に対応しています。`tables` パラメータを渡すことで、ネストされたフィールドを含むテーブルも同時に作成できます。
    operationId: createCategory
    tags:
      - ファイルカテゴリ
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              name:
                type: string
                description: ファイルカテゴリ名
                example: "インボイス"
                maxLength: 50
              category_prompt:
                type: string
                description: 分類用プロンプト
                example: "VAT インボイス。インボイスコード、インボイス番号などのフィールドを含みます。"
                maxLength: 150
              description:
                type: string
                description: ファイルカテゴリの説明
              extract_model:
                type: string
                description: |
                  抽出モデル
                  - Auto: 抽出モデルを自動でマッチング
                  - Acgpt: 高速で安定した抽出結果
                  - Acgpt-VL: VLM。シンプルな抽出に適しています（≤10 ページ）
                  - DF-M1: 複雑な文書理解に適しています
                example: "Acgpt"
                enum:
                  - Auto
                  - Acgpt
                  - Acgpt-VL
                  - DF-M1
              sample_files:
                type: array
                description: サンプルファイルリスト。少なくとも 1 つのサンプルファイルをアップロードする必要があります。1 つのカテゴリには最大 20 個のサンプルファイルを設定できます
                items:
                  type: string
                  format: binary
                minItems: 1
                maxItems: 10
              fields:
                type: array
                description: フィールド設定リスト。少なくとも 1 つのフィールドを設定する必要があります
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
              tables:
                type: array
                description: 任意。テーブル設定リスト（一括作成）。ネストされたフィールドに対応しています
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryTableConfig'
              with_detail:
                type: boolean
                description: |
                  完全な詳細を返すかどうか。true の場合、レスポンスにカテゴリの完全な情報（フィールド、テーブル、サンプルを含む）が含まれます。
                  未設定または false の場合、category_id のみを返します。
            required:
              - workspace_id
              - name
              - extract_model
              - sample_files
              - fields
    responses:
      '200':
        description: ファイルカテゴリの作成に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        category_id:
                          type: string
                          description: ファイルカテゴリ ID
                          example: "1234567890"
                        name:
                          type: string
                          description: ファイルカテゴリ名（with_detail=true の場合に返却）
                        description:
                          type: string
                          description: ファイルカテゴリの説明（with_detail=true の場合に返却）
                        category_prompt:
                          type: string
                          description: 分類プロンプト（with_detail=true の場合に返却）
                        extract_model:
                          type: string
                          description: 抽出モデル（with_detail=true の場合に返却）
                        enabled:
                          type: integer
                          description: 有効化ステータス（with_detail=true の場合に返却）
                        fields:
                          type: array
                          description: フィールドリスト（with_detail=true の場合に返却）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryField'
                        tables:
                          type: array
                          description: テーブルリスト（with_detail=true の場合に返却）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryTable'
                        samples:
                          type: array
                          description: サンプルリスト（with_detail=true の場合に返却）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategorySample'
                      required:
                        - category_id

/api/app-api/sip/platform/v2/category/list:
  get:
    summary: ワークスペースのファイルカテゴリ一覧を取得
    tags:
      - ファイルカテゴリ
    description: ワークスペースのファイルカテゴリ一覧を取得します
    operationId: listCategories
    parameters:
      - name: workspace_id
        in: query
        description: ワークスペース ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: ページ番号
        required: false
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: ページサイズ
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: enabled
        in: query
        description: |
          有効化ステータス
          - all: All
          - 1: 有効
          - 0: 無効
          - 2: 下書き
        required: false
        schema:
          type: string
          default: "1"
          enum:
            - "all"
            - "1"
            - "0"
            - "2"
    responses:
      '200':
        description: ワークスペースのファイルカテゴリリストを正常に取得しました
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: ファイルカテゴリ総数
                          example: 100
                        page:
                          type: integer
                          description: 現在のページ番号
                          example: 1
                        page_size:
                          type: integer
                          description: ページサイズ
                          example: 20
                        categories:
                          type: array
                          items:
                            $ref: '../components/schemas/categories.yaml#/Category'

/api/app-api/sip/platform/v2/category/update:
  post:
    summary: ファイルカテゴリを更新
    description: |
      指定したファイルカテゴリ情報を更新します。

      注意: extract_model を設定すると、このカテゴリ配下のすべてのフィールドとテーブルの抽出モデルが連鎖的に上書きされます。
    operationId: updateCategory
    tags:
      - ファイルカテゴリ
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_id:
                type: string
                description: ファイルカテゴリ ID
                example: "1234567890"
              name:
                type: string
                description: ファイルカテゴリ名
                example: "インボイス"
                maxLength: 50
              category_prompt:
                type: string
                description: 分類用プロンプト
                example: "VAT インボイス。インボイスコード、インボイス番号などのフィールドを含みます。"
                maxLength: 150
              enabled:
                $ref: '../components/schemas/categories.yaml#/EnabledStatus'
              extract_model:
                type: string
                description: |
                  抽出モデル, cascades to all fields and tables when set
                  - Auto: 抽出モデルを自動でマッチング
                  - Acgpt: 高速で安定した抽出結果
                  - Acgpt-VL: VLM。シンプルな抽出に適しています（≤10 ページ）
                  - DF-M1: 複雑な文書理解に適しています
                example: "Acgpt"
                enum:
                  - Auto
                  - Acgpt
                  - Acgpt-VL
                  - DF-M1
              with_detail:
                type: boolean
                description: |
                  完全な詳細を返すかどうか。true の場合、子レベルのフィールド/テーブルを除くカテゴリ自身の情報を返します。
                  未設定または false の場合、code/msg のみを返します。
            required:
              - workspace_id
              - category_id
    responses:
      '200':
        description: ファイルカテゴリの更新に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      description: with_detail=true の場合はカテゴリ自身の情報、それ以外は null
                      type: object
                      properties:
                        id:
                          type: string
                          description: カテゴリ ID
                        name:
                          type: string
                          description: カテゴリ名
                        description:
                          type: string
                          description: カテゴリ説明
                        category_prompt:
                          type: string
                          description: 分類プロンプト
                        extract_model:
                          type: string
                          description: 抽出モデル
                        enabled:
                          type: integer
                          description: 有効化ステータス

/api/app-api/sip/platform/v2/category/delete:
  post:
    summary: ファイルカテゴリを削除
    description: 指定したファイルカテゴリを削除します
    operationId: deleteCategory
    tags:
      - ファイルカテゴリ
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_ids:
                type: array
                items:
                  type: string
                description: 削除するファイルカテゴリ ID のリスト
                example: ["1234567890", "0987654321"]
            required:
              - workspace_id
              - category_ids
    responses:
      '200':
        description: ファイルカテゴリの削除に成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

/api/app-api/sip/platform/v2/category/fields/list:
  get:
    summary: ファイルカテゴリのフィールド一覧を取得
    description: ファイルカテゴリのフィールド一覧を取得します。通常フィールドとテーブル（テーブルフィールドを含む）を含みます
    operationId: listCategoryFields
    tags:
      - ファイルカテゴリ
    parameters:
      - name: workspace_id
        in: query
        description: ワークスペース ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: category_id
        in: query
        description: ファイルカテゴリ ID
        required: true
        schema:
          type: string
          example: "1234567890"
    responses:
      '200':
        description: ファイルカテゴリフィールド一覧の取得に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        fields:
                          type: array
                          description: 通常フィールドリスト
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryField'
                        tables:
                          type: array
                          description: テーブルリスト（テーブルフィールドを含む）
                          items:
                            $ref: '../components/schemas/categories.yaml#/CategoryTable'

/api/app-api/sip/platform/v2/category/fields/batch_add:
  post:
    summary: ファイルカテゴリのフィールドを追加
    description: 指定したファイルカテゴリ配下に複数のフィールドを追加します。全件成功または全件失敗のセマンティクスを採用しており、いずれかのフィールドが検証に失敗するとバッチ全体が失敗します。
    operationId: batchAddCategoryFields
    tags:
      - ファイルカテゴリ
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_id:
                type: string
                description: ファイルカテゴリ ID
                example: "1234567890"
              table_id:
                type: string
                description: |
                  テーブル ID
                  - 未指定または空の場合: 通常フィールドを作成します
                  - テーブル ID を指定した場合: 指定したテーブル配下にテーブルフィールドを作成します
              fields:
                type: array
                description: 追加するフィールドのリスト
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
                minItems: 1
              with_detail:
                type: boolean
                description: 各フィールドの完全な詳細を返すかどうか
            required:
              - workspace_id
              - category_id
              - fields
    responses:
      '200':
        description: フィールドの追加に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: array
                      description: 作成結果リスト。リクエストと同じ順序です
                      items:
                        type: object
                        properties:
                          field_id:
                            type: string
                            description: フィールド ID
                          name:
                            type: string
                            description: フィールド名（with_detail=true の場合に返却）
                          description:
                            type: string
                          prompt:
                            type: string
                          use_prompt:
                            type: boolean
                          alias:
                            type: array
                            items:
                              type: string
                          identity:
                            type: string
                          multi_value:
                            type: boolean
                          duplicate_value_distinct:
                            type: boolean
                          transform_settings:
                            $ref: '../components/schemas/categories.yaml#/TransformSettings'
                          extract_model:
                            type: string
                          enabled:
                            type: integer
                        required:
                          - field_id

/api/app-api/sip/platform/v2/category/fields/batch_update:
  post:
    summary: ファイルカテゴリのフィールドを更新
    description: 指定したファイルカテゴリ配下の複数フィールドを更新します。全件成功または全件失敗のセマンティクスを採用しています。
    operationId: batchUpdateCategoryFields
    tags:
      - ファイルカテゴリ
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_id:
                type: string
                description: ファイルカテゴリ ID
                example: "1234567890"
              fields:
                type: array
                description: 更新するフィールドのリスト
                items:
                  $ref: '../components/schemas/categories.yaml#/CategoryFieldUpdateItem'
                minItems: 1
              with_detail:
                type: boolean
                description: 更新後の各フィールドの完全な詳細を返すかどうか
            required:
              - workspace_id
              - category_id
              - fields
    responses:
      '200':
        description: フィールドの更新に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: array
                      description: with_detail=true の場合は更新後のフィールドリスト、それ以外は null
                      items:
                        type: object
