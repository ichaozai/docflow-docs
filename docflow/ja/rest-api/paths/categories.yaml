                          field_id:
                            type: string
                          name:
                            type: string
                          description:
                            type: string
                          prompt:
                            type: string
                          use_prompt:
                            type: boolean
                          alias:
                            type: array
                            items:
                              type: string
                          identity:
                            type: string
                          multi_value:
                            type: boolean
                          duplicate_value_distinct:
                            type: boolean
                          transform_settings:
                            $ref: '../components/schemas/categories.yaml#/TransformSettings'
                          extract_model:
                            type: string
                          enabled:
                            type: integer

/api/app-api/sip/platform/v2/category/fields/delete:
  post:
    summary: ファイルカテゴリのフィールドを削除
    description: 指定したファイルカテゴリフィールドを削除します。通常フィールドとテーブルフィールドの一括削除に対応しています
    operationId: deleteCategoryFields
    tags:
      - ファイルカテゴリ
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_id:
                type: string
                description: ファイルカテゴリ ID
                example: "1234567890"
              field_ids:
                type: array
                description: 削除するフィールド ID のリスト
                items:
                  type: string
                example: ["1234567890", "0987654321"]
              table_id:
                type: string
                description: |
                  テーブル ID
                  - 未指定の場合: 通常フィールド（result.fields 内のフィールド）を削除します
                  - テーブル ID を指定した場合: 指定したテーブル配下のテーブルフィールド（result.tables[].fields 内のフィールド）を削除します
                example: "1234567890"
            required:
              - workspace_id
              - category_id
              - field_ids
    responses:
      '200':
        description: ファイルカテゴリフィールドの削除に成功
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/CodeMessage'

# 廃止済み - 上記のバッチエンドポイントを使用してください
/api/app-api/sip/platform/v2/category/fields/add:
  post:
    summary: 単一ファイルカテゴリフィールドを追加
    description: |
      指定したファイルカテゴリ配下に新しいフィールドを追加します。通常フィールドとテーブルフィールドの両方に対応しています

      > ⚠️ このエンドポイントは現在も利用できますが、今後メンテナンスされません。代わりに [ファイルカテゴリのフィールドを追加](/api-reference/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB%E3%82%AB%E3%83%86%E3%82%B4%E3%83%AA/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB%E3%82%AB%E3%83%86%E3%82%B4%E3%83%AA%E3%81%AE%E3%83%95%E3%82%A3%E3%83%BC%E3%83%AB%E3%83%89%E3%82%92%E8%BF%BD%E5%8A%A0) を使用してください。
    operationId: addCategoryField
    tags:
      - 廃止済み
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/categories.yaml#/CategoryFieldConfig'
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_id:
                type: string
                description: ファイルカテゴリ ID
                example: "1234567890"
              table_id:
                type: string
                description: |
                  テーブル ID
                  - 未指定または空の場合: 通常フィールドを作成し、結果は result.fields に表示されます
                  - テーブル ID を指定した場合: 指定したテーブル配下にテーブルフィールドを作成し、結果は result.tables[].fields に表示されます
                example: "1234567890"
              extract_model:
                type: string
                description: |
                  任意。フィールドレベルの抽出モデル。通常フィールド（テーブルフィールド以外）のみ対応し、未指定の場合は分類レベルの設定に従います（分類レベルが mixed または null の場合は Auto がデフォルト）
                  - Auto: 抽出モデルを自動でマッチング
                  - Acgpt: 高速で安定した抽出結果
                  - Acgpt-VL: VLM。シンプルな抽出に適しています（≤10 ページ）
                  - DF-M1: 複雑な文書理解に適しています
                example: "Acgpt"
                enum:
                  - Auto
                  - Acgpt
                  - Acgpt-VL
                  - DF-M1
              with_detail:
                type: boolean
                description: |
                  完全な詳細を返すかどうか。true の場合、レスポンスにフィールドの完全な情報が含まれます。
                  未設定または false の場合、field_id のみを返します。
            required:
              - workspace_id
              - category_id
              - name
    responses:
      '200':
        description: ファイルカテゴリフィールドの追加に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        field_id:
                          type: string
                          description: 新規作成されたフィールド ID
                          example: "1234567890"
                        name:
                          type: string
                          description: フィールド名（with_detail=true の場合に返却）
                        description:
                          type: string
                          description: フィールドの説明（with_detail=true の場合に返却）
                        prompt:
                          type: string
                          description: 意味抽出プロンプト（with_detail=true の場合に返却）
                        use_prompt:
                          type: boolean
                          description: 意味抽出プロンプトを使用するかどうか（with_detail=true の場合に返却）
                        alias:
                          type: array
                          items:
                            type: string
                          description: フィールド別名（with_detail=true の場合に返却）
                        identity:
                          type: string
                          description: エクスポート時のフィールド名（with_detail=true の場合に返却）
                        multi_value:
                          type: boolean
                          description: 複数値抽出を有効にするかどうか（with_detail=true の場合に返却）
                        duplicate_value_distinct:
                          type: boolean
                          description: 重複値除去を有効にするかどうか（with_detail=true の場合に返却）
                        transform_settings:
                          $ref: '../components/schemas/categories.yaml#/TransformSettings'
                        extract_model:
                          type: string
                          description: フィールド抽出モデル（with_detail=true の場合に返却）
                        enabled:
                          type: integer
                          description: 有効化ステータス（with_detail=true の場合に返却）
                      required:
                        - field_id

/api/app-api/sip/platform/v2/category/fields/update:
  post:
    summary: 単一ファイルカテゴリフィールドを更新
    description: |
