      - ファイルカテゴリサンプル
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              category_id:
                type: string
                description: ファイルカテゴリ ID
                example: "1234567890"
              sample_ids:
                type: array
                description: ダウンロードするサンプル ID のリスト。指定しない場合、このカテゴリのすべてのサンプルをダウンロードします。
                items:
                  type: string
                example: ["1234567890", "0987654321"]
