/api/app-api/sip/platform/v2/review/rule_repo/list:
  get:
    summary: レビュー規則リポジトリ一覧を取得
    description: Get review rule repository list, including rule groups and rules information under the repository
    operationId: listReviewRuleRepo
    tags:
      - スマートレビュー
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
          example: 1
          default: 1
      - name: page_size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          example: 10
          default: 10
    responses:
      '200':
        description: Successfully retrieved review rule repository list
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        repos:
                          type: array
                          items:
                            $ref: '../components/schemas/reviews.yaml#/ReviewRuleRepo'
                        total:
                          type: integer
                          description: Total count
                          example: 100
                        page:
                          type: integer
                          description: Page number
                          example: 1
                        page_size:
                          type: integer
                          description: Page size
                          example: 10

/api/app-api/sip/platform/v2/review/rule_repo/get:
  get:
    summary: レビュー規則リポジトリを取得
    description: Get review rule repository
    operationId: getReviewRuleRepo
    tags:
      - スマートレビュー
    parameters:
      - name: workspace_id
        in: query
        description: Workspace ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: repo_id
        in: query
        description: Review rule repository ID
        required: true
        schema:
          type: string
          example: "31415926"
    responses:
      '200':
        description: Successfully retrieved review rule repository
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      $ref: '../components/schemas/reviews.yaml#/ReviewRuleRepo'
