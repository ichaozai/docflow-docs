    parameters:
      - name: workspace_id
        in: query
        description: ワークスペース ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: repo_id
        in: query
        description: レビュー規則リポジトリ ID
        required: true
        schema:
          type: string
          example: "31415926"
    responses:
      '200':
        description: レビュー規則リポジトリの取得に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      $ref: '../components/schemas/reviews.yaml#/ReviewRuleRepo'
