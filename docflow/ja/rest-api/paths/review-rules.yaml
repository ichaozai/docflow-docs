/api/app-api/sip/platform/v2/review/rule_repo/create:
  post:
    summary: レビュー規則リポジトリを作成
    description: レビュー規則リポジトリを作成します
    operationId: createReviewRuleRepo
    tags:
      - スマートレビュー
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              name:
                type: string
                description: リポジトリ名
                example: "レビュー規則リポジトリ 1"
                maxLength: 30
            required:
              - workspace_id
              - name
    responses:
      '200':
        description: レビュー規則リポジトリの作成に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        repo_id:
                          type: integer
                          description: レビュー規則リポジトリ ID
                          example: "31415926"

/api/app-api/sip/platform/v2/review/rule_repo/delete:
  post:
    summary: レビュー規則リポジトリを削除
    description: レビュー規則リポジトリを削除します
    operationId: deleteReviewRuleRepo
    tags:
      - スマートレビュー
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              workspace_id:
                type: string
                description: ワークスペース ID
                example: "1234567890"
              repo_ids:
                type: array
                items:
                  type: integer
                  description: レビュー規則リポジトリ ID
                  example: "31415926"
            required:
              - workspace_id
              - repo_ids
    responses:
      '200':
        description: レビュー規則リポジトリの削除に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'

