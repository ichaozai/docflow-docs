/api/app-api/sip/platform/v2/review/rule_repo/list:
  get:
    summary: レビュー規則リポジトリ一覧を取得
    description: レビュー規則リポジトリ一覧を取得します。リポジトリ配下の規則グループと規則情報を含みます
    operationId: listReviewRuleRepo
    tags:
      - スマートレビュー
    parameters:
      - name: workspace_id
        in: query
        description: ワークスペース ID
        required: true
        schema:
          type: string
          example: "1234567890"
      - name: page
        in: query
        description: ページ番号
        required: false
        schema:
          type: integer
          example: 1
          default: 1
      - name: page_size
        in: query
        description: ページサイズ
        required: false
        schema:
          type: integer
          example: 10
          default: 10
    responses:
      '200':
        description: レビュー規則リポジトリ一覧の取得に成功
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/common.yaml#/CodeMessage'
                - type: object
                  properties:
                    result:
                      type: object
                      properties:
                        repos:
                          type: array
                          items:
                            $ref: '../components/schemas/reviews.yaml#/ReviewRuleRepo'
                        total:
                          type: integer
                          description: 総件数
                          example: 100
                        page:
                          type: integer
                          description: ページ番号
                          example: 1
                        page_size:
                          type: integer
                          description: ページサイズ
                          example: 10

/api/app-api/sip/platform/v2/review/rule_repo/get:
  get:
    summary: レビュー規則リポジトリを取得
    description: レビュー規則リポジトリを取得します
    operationId: getReviewRuleRepo
    tags:
